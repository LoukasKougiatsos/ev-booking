<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChargeFlow Register</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <main class="register-page">
    <section class="register-left">
      <img src="assets/registerpage.png" alt="EV charger">
      <div class="left-content">
        <h1>ChargeFlow</h1>
        <p>The backbone of your electric journey. Join the most reliable charging network engineered for the future of mobility.</p>
        <div class="stats">
          <article class="stat">
            <span class="icon">&#9889;</span>
            <h3>ULTRA-FAST</h3>
            <span>350kW Stations</span>
          </article>
          <article class="stat">
            <span class="icon">&#10084;</span>
            <h3>99.9% UPTIME</h3>
            <span>Cloud Monitored</span>
          </article>
        </div>
      </div>
    </section>

    <section class="register-right">
      <div class="register-card">
        <h2>Create Account</h2>
        <p>Access our high-performance charging network.</p>

        <form class="register-form">
          <label for="fullName">FULL NAME</label>
          <input id="fullName" type="text" placeholder="Enter your full name">

          <label for="email">EMAIL ADDRESS</label>
          <input id="email" type="email" placeholder="name@company.com">

          <label for="username">USERNAME</label>
          <input id="username" type="text" placeholder="Choose a unique username">

          <div class="password-grid">
            <div>
              <label for="password">PASSWORD</label>
              <input id="password" type="password" placeholder="********">
            </div>
            <div>
              <label for="confirm">CONFIRM</label>
              <input id="confirm" type="password" placeholder="********">
            </div>
          </div>

          <label class="terms">
            <input type="checkbox">
            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
          </label>

          <button type="submit" class="btn-create">Create Account &nbsp; &#8594;</button>
        </form>

        <div class="card-divider"></div>
        <p class="signin-line">Already have an account? <a href="login.html">Back to Login</a></p>
      </div>
    </section>
  </main>
<script>
  document.querySelector('.register-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;

    if (password !== confirm) {
      alert('Passwords do not match.');
      return;
    }

    if (password.length < 8) {
      alert('Password must be at least 8 characters.');
      return;
    }

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (res.status === 409) {
        alert('An account with this email already exists.');
        return;
      }

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert(err.message || 'Registration failed. Please try again.');
        return;
      }

      const data = await res.json();
      window.Auth.setToken(data.token);
      window.location.href = data.role === 'ADMIN' ? 'admin.html' : 'discover.html';
    } catch {
      alert('Network error. Please try again.');
    }
  });
</script>
</body>
</html>
