spring:
  application:
    name: ev-booking-server
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-must-be-at-least-32-bytes-long-aaaaa}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
